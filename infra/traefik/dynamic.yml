# Traefik dynamic routing: host-based routing to the API and web services by their
# compose-network DNS names. Tenants are resolved by the API from the (forwarded) hostname.
http:
  routers:
    api:
      rule: "Host(`api.localhost`)"
      entryPoints:
        - web
      service: api
    web:
      rule: "Host(`app.localhost`)"
      entryPoints:
        - web
      service: web

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://api:8000"
    web:
      loadBalancer:
        servers:
          - url: "http://web:3000"
