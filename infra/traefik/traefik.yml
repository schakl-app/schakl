# Traefik static config. Uses the FILE provider (dynamic.yml) instead of the Docker socket, so
# the same stack runs under Docker and podman without extra privileges.
entryPoints:
  web:
    address: ":80"

# The dashboard/API is intentionally NOT enabled (audit F12): `api.insecure: true` served the full
# routing topology and runtime config with no authentication on :8080. If you need the dashboard,
# enable it behind an auth middleware on an internal-only entrypoint — never insecure + published.

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO
