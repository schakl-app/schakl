# vlotr — full stack (CLAUDE.md §3). Runs with Docker Compose or `podman compose`.
#   web · api · worker · db · redis · traefik
#
#   cp infra/.env.example infra/.env   # then edit secrets
#   docker compose -f infra/compose.yaml up --build
#
# Web:  http://app.localhost   ·   API/docs: http://api.localhost/docs   ·   Traefik: :8080
name: vlotr

# Shared API/worker environment (DRY via YAML anchor).
x-api-env: &api-env
  VLOTR_DATABASE_URL: postgresql+asyncpg://${APP_DB_USER:-vlotr_app}:${APP_DB_PASSWORD:-vlotr_app}@db:5432/${POSTGRES_DB:-vlotr}
  VLOTR_REDIS_URL: redis://redis:6379/0
  VLOTR_SECRET_KEY: ${VLOTR_SECRET_KEY:-dev-secret-change-me-in-production}
  VLOTR_BASE_DOMAIN: ${VLOTR_BASE_DOMAIN:-localhost}
  VLOTR_ENVIRONMENT: ${VLOTR_ENVIRONMENT:-development}
  VLOTR_SEED_ORG_SLUG: ${VLOTR_SEED_ORG_SLUG:-vlotr}
  VLOTR_SEED_ORG_NAME: ${VLOTR_SEED_ORG_NAME:-vlotr}
  VLOTR_SEED_ADMIN_EMAIL: ${VLOTR_SEED_ADMIN_EMAIL:-admin@example.com}
  VLOTR_SEED_ADMIN_PASSWORD: ${VLOTR_SEED_ADMIN_PASSWORD:-changeme123}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-vlotr}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-vlotr}
      POSTGRES_DB: ${POSTGRES_DB:-vlotr}
      APP_DB_USER: ${APP_DB_USER:-vlotr_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-vlotr_app}
    volumes:
      - db-data:/var/lib/postgresql/data
      # ":z" relabels the bind mount for SELinux hosts (Fedora/RHEL); ignored elsewhere.
      - ./db/init:/docker-entrypoint-initdb.d:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-vlotr} -d ${POSTGRES_DB:-vlotr}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: ghcr.io/vlotr-crm/vlotr-api:${VLOTR_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment: *api-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  worker:
    image: ghcr.io/vlotr-crm/vlotr-api:${VLOTR_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["worker"]
    environment: *api-env
    depends_on:
      api:
        condition: service_healthy   # ensures migrations have run
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/vlotr-crm/vlotr-web:${VLOTR_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      VLOTR_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports:
      # Default :80 for production. Rootless podman can't bind privileged ports, so set
      # TRAEFIK_HTTP_PORT=8080 (or any >=1024) and browse http://app.localhost:8080
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./traefik:/etc/traefik:ro,z
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  db-data:
