# vlotr — full stack (CLAUDE.md §3). Runs with Docker Compose or `podman compose`.
#   web · api · worker · db · redis · traefik
#
#   cp infra/.env.example infra/.env   # then edit secrets
#   docker compose -f infra/compose.yaml up --build
#
# Web:  http://app.localhost   ·   API/docs: http://api.localhost/docs   ·   Traefik: :8080
name: vlotr

# Shared API/worker environment (DRY via YAML anchor).
x-api-env: &api-env
  VLOTR_DATABASE_URL: postgresql+asyncpg://${APP_DB_USER:-vlotr_app}:${APP_DB_PASSWORD:-vlotr_app}@db:5432/${POSTGRES_DB:-vlotr}
  VLOTR_REDIS_URL: redis://redis:6379/0
  VLOTR_SECRET_KEY: ${VLOTR_SECRET_KEY:-dev-secret-change-me-in-production}
  VLOTR_BASE_DOMAIN: ${VLOTR_BASE_DOMAIN:-localhost}
  VLOTR_ENVIRONMENT: ${VLOTR_ENVIRONMENT:-development}
  # Cross-tenant admin surface (issue #26): off by default; instance owners only.
  VLOTR_INSTANCE_ADMIN_ENABLED: ${VLOTR_INSTANCE_ADMIN_ENABLED:-false}
  # --- OIDC single sign-on (optional; CLAUDE.md §3). Set _ENABLED to turn the button on;
  # set _ENFORCED to true to disable local password login entirely. ---
  VLOTR_OIDC_ENABLED: ${VLOTR_OIDC_ENABLED:-false}
  VLOTR_OIDC_ENFORCED: ${VLOTR_OIDC_ENFORCED:-false}
  VLOTR_OIDC_NAME: ${VLOTR_OIDC_NAME:-sso}
  VLOTR_OIDC_DISCOVERY_URL: ${VLOTR_OIDC_DISCOVERY_URL:-}
  VLOTR_OIDC_CLIENT_ID: ${VLOTR_OIDC_CLIENT_ID:-}
  VLOTR_OIDC_CLIENT_SECRET: ${VLOTR_OIDC_CLIENT_SECRET:-}
  VLOTR_OIDC_AUTO_PROVISION_MEMBERSHIP: ${VLOTR_OIDC_AUTO_PROVISION_MEMBERSHIP:-true}
  VLOTR_OIDC_DEFAULT_ROLE: ${VLOTR_OIDC_DEFAULT_ROLE:-member}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-vlotr}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-vlotr}
      POSTGRES_DB: ${POSTGRES_DB:-vlotr}
      APP_DB_USER: ${APP_DB_USER:-vlotr_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-vlotr_app}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-vlotr} -d ${POSTGRES_DB:-vlotr}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Creates the NON-superuser application role the API/worker connect as, so Postgres RLS is
  # enforced (superusers bypass it). It owns the public schema so alembic can create tables
  # and policies while still being subject to FORCE ROW LEVEL SECURITY. See CLAUDE.md §5.
  #
  # Deliberately NOT /docker-entrypoint-initdb.d: that only runs when PGDATA is empty. This
  # runs on every `up`, is idempotent, and needs no host files — so the production stack in
  # compose.tunnel.yaml bootstraps by the exact same path this one does.
  db-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_ADMIN_USER:-vlotr}
      PGPASSWORD: ${POSTGRES_ADMIN_PASSWORD:-vlotr}
      PGDATABASE: ${POSTGRES_DB:-vlotr}
      APP_DB_USER: ${APP_DB_USER:-vlotr_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-vlotr_app}
    # `$$` escapes Compose interpolation so the shell expands these, not Compose.
    entrypoint:
      - sh
      - -ec
      - |
        psql -v ON_ERROR_STOP=1 \
          -v app_user="$$APP_DB_USER" -v app_pass="$$APP_DB_PASSWORD" -v db="$$PGDATABASE" <<'SQL'
        SELECT format('CREATE ROLE %I LOGIN PASSWORD %L NOSUPERUSER', :'app_user', :'app_pass')
        WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'app_user')\gexec

        ALTER ROLE :"app_user" WITH LOGIN PASSWORD :'app_pass' NOSUPERUSER;
        GRANT ALL ON DATABASE :"db" TO :"app_user";
        ALTER SCHEMA public OWNER TO :"app_user";
        GRANT ALL ON SCHEMA public TO :"app_user";
        SQL
        echo "→ app role '$$APP_DB_USER' present and in sync"
    restart: "no"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: ghcr.io/vlotr-crm/vlotr-api:${VLOTR_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment: *api-env
    depends_on:
      # Not `db: service_healthy` — the app role must exist before `alembic upgrade head`
      # connects as it. db-init already waits on db being healthy.
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  worker:
    image: ghcr.io/vlotr-crm/vlotr-api:${VLOTR_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["worker"]
    environment: *api-env
    depends_on:
      api:
        condition: service_healthy   # ensures migrations have run
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/vlotr-crm/vlotr-web:${VLOTR_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      VLOTR_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports:
      # Default :80 for production. Rootless podman can't bind privileged ports, so set
      # TRAEFIK_HTTP_PORT=8080 (or any >=1024) and browse http://app.localhost:8080
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./traefik:/etc/traefik:ro,z
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  db-data:
