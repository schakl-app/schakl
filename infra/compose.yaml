# schakl — full stack (CLAUDE.md §3). Runs with Docker Compose or `podman compose`.
#   web · api · worker · db · redis · traefik
#
#   cp infra/.env.example infra/.env   # then edit secrets
#   docker compose -f infra/compose.yaml up --build
#
# Web:  http://app.localhost   ·   API/docs: http://api.localhost/docs   ·   Traefik: :8080
name: schakl

# Shared API/worker environment (DRY via YAML anchor).
x-api-env: &api-env
  SCHAKL_DATABASE_URL: postgresql+asyncpg://${APP_DB_USER:-schakl_app}:${APP_DB_PASSWORD:-schakl_app}@db:5432/${POSTGRES_DB:-schakl}
  SCHAKL_REDIS_URL: redis://redis:6379/0
  SCHAKL_SECRET_KEY: ${SCHAKL_SECRET_KEY:-dev-secret-change-me-in-production}
  SCHAKL_BASE_DOMAIN: ${SCHAKL_BASE_DOMAIN:-localhost}
  SCHAKL_ENVIRONMENT: ${SCHAKL_ENVIRONMENT:-development}
  # Cross-tenant admin surface (issue #26): off by default; instance owners only.
  SCHAKL_INSTANCE_ADMIN_ENABLED: ${SCHAKL_INSTANCE_ADMIN_ENABLED:-false}
  # --- Single sign-on (#76): configured IN THE APP (Instellingen -> Single sign-on), not
  # here. The SCHAKL_OIDC_* pass-through below is retired and kept ONE release only, so the
  # #76 upgrade migration can still read an existing install's env and seed the database
  # from it (secret stored encrypted). Remove next release. ---
  SCHAKL_OIDC_ENABLED: ${SCHAKL_OIDC_ENABLED:-false}
  SCHAKL_OIDC_ENFORCED: ${SCHAKL_OIDC_ENFORCED:-false}
  SCHAKL_OIDC_NAME: ${SCHAKL_OIDC_NAME:-sso}
  SCHAKL_OIDC_DISCOVERY_URL: ${SCHAKL_OIDC_DISCOVERY_URL:-}
  SCHAKL_OIDC_CLIENT_ID: ${SCHAKL_OIDC_CLIENT_ID:-}
  SCHAKL_OIDC_CLIENT_SECRET: ${SCHAKL_OIDC_CLIENT_SECRET:-}
  SCHAKL_OIDC_AUTO_PROVISION_MEMBERSHIP: ${SCHAKL_OIDC_AUTO_PROVISION_MEMBERSHIP:-true}
  SCHAKL_OIDC_DEFAULT_ROLE: ${SCHAKL_OIDC_DEFAULT_ROLE:-member}
  # Break-glass (docs/SSO.md): true re-enables local password login regardless of any org's
  # "require SSO" setting. Use it to recover from a broken IdP, then unset it.
  SCHAKL_FORCE_LOCAL_LOGIN: ${SCHAKL_FORCE_LOCAL_LOGIN:-false}
  # File storage (issue #123): the named volume below; back it up alongside the DB.
  SCHAKL_STORAGE_PATH: /data/storage
  # Google (Workspace + marketing, epics #22/#134). The OAuth client is normally configured
  # per-org in Instellingen -> Google (stored encrypted in the DB, read by api AND worker);
  # these are the documented env fallback. The Google Ads developer token is instance-level
  # with no per-org field, so the marketing Ads source can ONLY be configured here — it must be
  # on the shared anchor so the worker's nightly sync sees it too. Empty = unset (safe default).
  SCHAKL_GOOGLE_CLIENT_ID: ${SCHAKL_GOOGLE_CLIENT_ID:-}
  SCHAKL_GOOGLE_CLIENT_SECRET: ${SCHAKL_GOOGLE_CLIENT_SECRET:-}
  SCHAKL_GOOGLE_ADS_DEVELOPER_TOKEN: ${SCHAKL_GOOGLE_ADS_DEVELOPER_TOKEN:-}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-schakl}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-schakl}
      POSTGRES_DB: ${POSTGRES_DB:-schakl}
      APP_DB_USER: ${APP_DB_USER:-schakl_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-schakl_app}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-schakl} -d ${POSTGRES_DB:-schakl}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Creates the NON-superuser application role the API/worker connect as, so Postgres RLS is
  # enforced (superusers bypass it). It owns the public schema so alembic can create tables
  # and policies while still being subject to FORCE ROW LEVEL SECURITY. See CLAUDE.md §5.
  #
  # Deliberately NOT /docker-entrypoint-initdb.d: that only runs when PGDATA is empty. This
  # runs on every `up`, is idempotent, and needs no host files — so the production stack in
  # compose.tunnel.yaml bootstraps by the exact same path this one does.
  db-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_ADMIN_USER:-schakl}
      PGPASSWORD: ${POSTGRES_ADMIN_PASSWORD:-schakl}
      PGDATABASE: ${POSTGRES_DB:-schakl}
      APP_DB_USER: ${APP_DB_USER:-schakl_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-schakl_app}
    # `$$` escapes Compose interpolation so the shell expands these, not Compose.
    entrypoint:
      - sh
      - -ec
      - |
        psql -v ON_ERROR_STOP=1 \
          -v app_user="$$APP_DB_USER" -v app_pass="$$APP_DB_PASSWORD" -v db="$$PGDATABASE" <<'SQL'
        SELECT format('CREATE ROLE %I LOGIN PASSWORD %L NOSUPERUSER', :'app_user', :'app_pass')
        WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'app_user')\gexec

        ALTER ROLE :"app_user" WITH LOGIN PASSWORD :'app_pass' NOSUPERUSER;
        GRANT ALL ON DATABASE :"db" TO :"app_user";
        ALTER SCHEMA public OWNER TO :"app_user";
        GRANT ALL ON SCHEMA public TO :"app_user";
        SQL
        echo "→ app role '$$APP_DB_USER' present and in sync"
    restart: "no"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    image: ghcr.io/schakl-app/schakl-api:${SCHAKL_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment: *api-env
    volumes:
      # Uploaded files (issue #123) — stateful like db-data; back up both together.
      - storage-data:/data/storage
    depends_on:
      # Not `db: service_healthy` — the app role must exist before `alembic upgrade head`
      # connects as it. db-init already waits on db being healthy.
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  worker:
    image: ghcr.io/schakl-app/schakl-api:${SCHAKL_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["worker"]
    environment: *api-env
    volumes:
      # The worker shares the files volume (image variants / processing land here, #123).
      - storage-data:/data/storage
    depends_on:
      api:
        condition: service_healthy   # ensures migrations have run
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/schakl-app/schakl-web:${SCHAKL_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      SCHAKL_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  traefik:
    image: traefik:v3.1
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports:
      # Default :80 for production. Rootless podman can't bind privileged ports, so set
      # TRAEFIK_HTTP_PORT=8080 (or any >=1024) and browse http://app.localhost:8080
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./traefik:/etc/traefik:ro,z
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  db-data:
  storage-data:
