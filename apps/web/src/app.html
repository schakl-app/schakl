<!doctype html>
<!-- `lang` is the European BCP-47 *formatting* tag (en-GB, not en); `data-locale` is the app's
     locale code. They are not interchangeable — see hooks.server.ts. -->
<html lang="%lang%" data-locale="%locale%" style="%theme%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Per-tenant PWA manifest is resolved at runtime (Golden Rule 4); the favicon link is
         rendered by the root layout so the tenant's icon is the only one on the page. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
