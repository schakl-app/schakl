name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which downstream jobs are relevant to *this* change, so a web-only, site-only,
  # messages-only or docs-only commit doesn't pay for the ~9-minute API test job (and vice
  # versa). Runs in a few seconds. On `main` every job runs regardless (release integrity):
  # a merge commit's diff can be large and we never want a release gated on a partial matrix.
  # There is no branch protection, so a skipped job blocks no merge.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      i18n: ${{ steps.filter.outputs.i18n }}
      client: ${{ steps.filter.outputs.client }}
      run_all: ${{ steps.gate.outputs.run_all }}
    steps:
      # Full history so the gate can diff this push against its own previous commit. With a
      # shallow clone dorny/paths-filter can't see `github.event.before` and silently falls
      # back to diffing dev against main's merge-base — the whole release, i.e. every filter.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: gate
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_all=false" >> "$GITHUB_OUTPUT"
          fi
          # Base for the diff: on a push, exactly the commit before it; empty otherwise (a new
          # branch's all-zero SHA, or a pull_request) so dorny uses its own correct default.
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "push" ] && [ -n "$before" ] \
             && [ "$before" != "0000000000000000000000000000000000000000" ]; then
            echo "base=$before" >> "$GITHUB_OUTPUT"
          else
            echo "base=" >> "$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Diff only what this push changed (steps.gate.outputs.base); on pull_request this is
          # empty and dorny compares against the PR base branch.
          base: ${{ steps.gate.outputs.base }}
          # A change to the workflow itself, or to shared build/lint tooling, runs everything.
          filters: |
            api:
              - 'apps/api/**'
              # The API loads the repo-root message catalogs at import (app/i18n.py), so a
              # catalog change can affect API behaviour/tests — never skip the API on it.
              - 'messages/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'messages/**'
              - 'project.inlang/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              # `pnpm install --frozen-lockfile` validates the lockfile against every workspace
              # member (apps/web + apps/site), so a desynced apps/site manifest must run it too.
              - 'apps/site/package.json'
              - '.github/workflows/ci.yml'
            i18n:
              - 'messages/**'
              - 'scripts/i18n-check.mjs'
              - '.github/workflows/ci.yml'
            client:
              - 'apps/api/**'
              - 'apps/web/src/lib/core/api/schema.d.ts'
              - 'apps/web/package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              # Same frozen-lockfile reason as the web job: this job also runs pnpm install.
              - 'apps/site/package.json'
              - 'scripts/gen-client.sh'
              - '.github/workflows/ci.yml'

  i18n:
    name: i18n key drift
    needs: changes
    if: ${{ needs.changes.outputs.i18n == 'true' || needs.changes.outputs.run_all == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/i18n-check.mjs

  api:
    name: API (ruff + migrations + pytest)
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.run_all == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: schakl
          POSTGRES_PASSWORD: schakl
          POSTGRES_DB: schakl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schakl -d schakl"
          --health-interval 5s --health-timeout 3s --health-retries 20
      # The readiness probe and system-info screen depend on Redis; without a live one here
      # their real client code path would never execute in CI.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      # App connects as a NON-superuser so RLS is enforced (superusers bypass it).
      SCHAKL_DATABASE_URL: postgresql+asyncpg://schakl_app:schakl_app@localhost:5432/schakl
      SCHAKL_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Create non-superuser app role
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=schakl psql -h localhost -U schakl -d schakl -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE schakl_app WITH LOGIN PASSWORD 'schakl_app' NOSUPERUSER;
          GRANT ALL ON DATABASE schakl TO schakl_app;
          ALTER SCHEMA public OWNER TO schakl_app;
          GRANT ALL ON SCHEMA public TO schakl_app;
          SQL
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.27"
      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --frozen
      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check app tests
      - name: Migrations
        working-directory: apps/api
        run: uv run alembic upgrade head
      - name: Tests
        working-directory: apps/api
        run: uv run pytest

  web:
    name: Web (svelte-check + build)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.run_all == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @schakl/web check
      - name: Unit tests
        run: pnpm --filter @schakl/web test:unit
      - name: Build
        run: pnpm --filter @schakl/web build

  client-drift:
    name: Typed client is up to date
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' || needs.changes.outputs.run_all == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.27"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install API deps
        working-directory: apps/api
        run: uv sync --frozen
      - name: Regenerate typed client from OpenAPI
        run: pnpm run gen:client
      - name: Fail if the committed client drifted
        run: git diff --exit-code apps/web/src/lib/core/api/schema.d.ts
