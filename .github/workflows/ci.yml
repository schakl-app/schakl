name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  i18n:
    name: i18n key drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/i18n-check.mjs

  api:
    name: API (ruff + migrations + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vlotr
          POSTGRES_PASSWORD: vlotr
          POSTGRES_DB: vlotr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vlotr -d vlotr"
          --health-interval 5s --health-timeout 3s --health-retries 20
      # The readiness probe and system-info screen depend on Redis; without a live one here
      # their real client code path would never execute in CI.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      # App connects as a NON-superuser so RLS is enforced (superusers bypass it).
      VLOTR_DATABASE_URL: postgresql+asyncpg://vlotr_app:vlotr_app@localhost:5432/vlotr
      VLOTR_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Create non-superuser app role
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=vlotr psql -h localhost -U vlotr -d vlotr -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE vlotr_app WITH LOGIN PASSWORD 'vlotr_app' NOSUPERUSER;
          GRANT ALL ON DATABASE vlotr TO vlotr_app;
          ALTER SCHEMA public OWNER TO vlotr_app;
          GRANT ALL ON SCHEMA public TO vlotr_app;
          SQL
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.27"
      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --frozen
      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check app tests
      - name: Migrations
        working-directory: apps/api
        run: uv run alembic upgrade head
      - name: Tests
        working-directory: apps/api
        run: uv run pytest

  web:
    name: Web (svelte-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm --filter @vlotr/web check
      - name: Build
        run: pnpm --filter @vlotr/web build

  client-drift:
    name: Typed client is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.27"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install API deps
        working-directory: apps/api
        run: uv sync --frozen
      - name: Regenerate typed client from OpenAPI
        run: pnpm run gen:client
      - name: Fail if the committed client drifted
        run: git diff --exit-code apps/web/src/lib/core/api/schema.d.ts
